name: ictest E2E

on:
  pull_request:
  push:
    tags:
      - "**"
    branches:
      - "main"
      - "master"

permissions:
  contents: read
  packages: write

env:
  GO_VERSION: 1.25.8
  TAR_PATH: /tmp/safrochain-docker-image.tar
  IMAGE_NAME: safrochain-docker-image

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: interchaintest/go.sum

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: safrochain:local
          outputs: type=docker,dest=${{ env.TAR_PATH }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_NAME }}
          path: ${{ env.TAR_PATH }}

  e2e-tests:
    needs: build-docker
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # names of `make` commands to run tests
        test:
          - "ictest-basic"
          - "ictest-statesync"
          - "ictest-ibchooks"
          - "ictest-tokenfactory"
          - "ictest-feeshare"
          - "ictest-pfm"
          - "ictest-globalfee"
          - "ictest-upgrade"
          - "ictest-ibc"
          - "ictest-unity-deploy"
          - "ictest-drip"
          - "ictest-feepay"
          - "ictest-burn"
          - "ictest-cwhooks"
          - "ictest-clock"
          - "ictest-gov-fix"
      fail-fast: false

    steps:
      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: interchaintest/go.sum

      - name: checkout chain
        uses: actions/checkout@v4

      - name: Download Tarball Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.IMAGE_NAME }}
          path: /tmp

      - name: Load Docker Image
        run: |
          docker image load -i ${{ env.TAR_PATH }}
          docker image ls -a

      # Some upgrade tests (e.g. ictest-gov-fix, ictest-upgrade) pull prior
      # chain versions from ghcr.io. Authenticate so private packages in the
      # same org are reachable.
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ictest-gov-fix exercises a chain upgrade and requires historical
      # GHCR images (v27.0.0 / v28.0.2). Forks (and even some upstream
      # tokens) cannot pull them. Skip cleanly when they are unreachable.
      - name: Pre-flight image availability check
        id: preflight
        run: |
          set +e
          if [[ "${{ matrix.test }}" == "ictest-gov-fix" ]]; then
            for repo in safrochain_org safrochain-org; do
              for tag in v27.0.0 v28.0.2; do
                if docker manifest inspect "ghcr.io/$repo/safrochain:$tag" >/dev/null 2>&1; then
                  echo "found=$repo" >> "$GITHUB_OUTPUT"
                  echo "Found historical image at ghcr.io/$repo/safrochain:$tag"
                  exit 0
                fi
              done
            done
            echo "found=" >> "$GITHUB_OUTPUT"
            echo "::warning::Historical upgrade images (v27.0.0/v28.0.2) are not pullable; skipping ${{ matrix.test }}."
          else
            echo "found=na" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Test
        id: run_test
        if: matrix.test != 'ictest-gov-fix' || steps.preflight.outputs.found != ''
        continue-on-error: true
        run: make ${{ matrix.test }}

      - name: Retry Failed Test
        if: steps.run_test.outcome == 'failure'
        run: |
          for i in 1 2; do
            echo "Retry attempt $i"
            if make ${{ matrix.test }}; then
              echo "Test passed on retry"
              exit 0
            fi
          done
          echo "Test failed after retries"
          exit 1
